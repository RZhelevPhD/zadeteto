<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>За Детето — Под поддръжка</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="brand_assets/zadeteto-app-icon.svg">
<link rel="stylesheet" href="brand_assets/fonts/fonts.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, #efe8ff 0%, #fdfcfb 100%);
    color: #1a103c;
    font-family: 'Inter', 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 520px;
    text-align: center;
    background: #fff;
    border-radius: 24px;
    padding: 48px 32px;
    box-shadow: 0 20px 60px rgba(124, 77, 255, 0.08);
    border: 1px solid rgba(124, 77, 255, 0.1);
  }
  .logo {
    height: 72px;
    margin-bottom: 32px;
  }
  .icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    background: rgba(124, 77, 255, 0.08);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg {
    width: 40px;
    height: 40px;
    stroke: #7c4dff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  h1 {
    font-family: 'PT Serif', 'DM Serif Display', serif;
    font-size: 32px;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  h1 span { color: #7c4dff; }
  p {
    font-size: 16px;
    line-height: 1.6;
    color: #8b80b0;
    margin-bottom: 24px;
  }
  .contact {
    padding-top: 24px;
    border-top: 1px solid #ece8f3;
    font-size: 14px;
    color: #8b80b0;
  }
  .contact a {
    color: #7c4dff;
    text-decoration: none;
    font-weight: 600;
  }
  @media (max-width: 480px) {
    .wrap { padding: 32px 20px; }
    h1 { font-size: 26px; }
    .logo { height: 56px; margin-bottom: 24px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="brand_assets/zadeteto-logo-horizontal.svg" alt="За Детето" class="logo">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    </div>
    <h1>Работим <span>по сайта</span></h1>
    <p>Скоро ще бъдем отново с вас. Извиняваме се за временното неудобство.</p>
    <div class="contact">
      За въпроси: <a href="mailto:hello@zadeteto.com">hello@zadeteto.com</a>
    </div>
  </div>
</body>
</html>
